# Deploy with: docker stack deploy -c docker-compose.yml immo-trends
# On the VPS, set IMAGE before deploying, e.g.:
#   export IMAGE=ghcr.io/madeindjs/immo-trends:latest
version: "3"
services:
  app:
    image: ${IMAGE:-ghcr.io/madeindjs/immo-trends}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
    ports:
      - "5001:3001"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      # SQLite DB path. Resolved by server/utils/dvf-db.ts via process.env.DVF_DB_PATH.
      - DVF_DB_PATH=/app/data/dvf.sqlite3
    volumes:
      # Named volume persisted across deploys. Mounted on a directory
      # (not the file directly) because Docker materializes an empty
      # directory at the mount point when the target path does not
      # exist in the image — which would trap us writing the SQLite
      # file *inside* that directory instead of at the expected path.
      # The entrypoint writes /app/data/dvf.sqlite3 into this volume
      # on first deploy; subsequent deploys find it already there and
      # skip the ~6 GB dataset download.
      - dvf-data:/app/data

volumes:
  dvf-data:
