# Deploy with: docker stack deploy -c docker-compose.yml immo-trends
# On the VPS, set IMAGE before deploying, e.g.:
#   export IMAGE=ghcr.io/madeindjs/immo-trends:latest
version: "3"
services:
  app:
    image: ${IMAGE:-ghcr.io/madeindjs/immo-trends}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
      restart_policy:
        condition: on-failure
    ports:
      - "5001:3001"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      # SQLite DB path. Resolved by server/utils/dvf-db.ts via process.env.DVF_DB_PATH.
      - DVF_DB_PATH=/app/data/dvf.sqlite3
    volumes:
      # Bind mount so the SQLite database lives on the host filesystem
      # (./data/dvf.sqlite3) and persists across image releases.
      - ./data:/app/data

# No named volume needed: we use a bind mount for the database.
